{% extends "customer/base.html" %}
{% block content %}
<h2 class="h4 mb-3">Dashboard</h2>
<div class="row g-3">
  <div class="col-md-4"><div class="metric-card p-3"><div class="metric-label">Orders</div><div class="metric-value">{{ order_count }}</div></div></div>
  <div class="col-md-4"><div class="metric-card p-3"><div class="metric-label">Open Invoices</div><div class="metric-value">{{ open_invoice_count }}</div></div></div>
  <div class="col-md-4"><div class="metric-card p-3"><div class="metric-label">Quick Action</div><a class="btn btn-primary btn-sm mt-2" href="{% url 'customers:order_new' %}">Submit New Order</a></div></div>
</div>
{% endblock %}

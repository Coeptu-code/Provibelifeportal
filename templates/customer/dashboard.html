{% extends "customer/base.html" %}
{% block content %}
<div class="page-head">
  <div>
    <h1>Dashboard</h1>
    <div class="lede">Welcome back. Here's your account overview.</div>
  </div>
</div>

<div class="stats">
  <div class="stat">
    <div class="lbl">Total Orders</div>
    <div class="v">{{ order_count }}</div>
  </div>
  <div class="stat">
    <div class="lbl">Open Invoices</div>
    <div class="v">{{ open_invoice_count }}</div>
  </div>
  <div class="stat feature">
    <div class="lbl">Quick Action</div>
    <div style="margin-top: 10px;">
      <a href="{% url 'customers:order_new' %}" class="btn gold">Submit New Order</a>
    </div>
    <div class="gold-line"></div>
  </div>
</div>
{% endblock %}

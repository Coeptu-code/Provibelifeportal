{% extends "admin_portal/base.html" %}
{% block content %}
<h2 class="h4 mb-3">{{ form_title|default:"Add Product" }}</h2>
{% if product %}
<p class="text-secondary">SKU: <strong>{{ product.sku }}</strong></p>
{% else %}
<p class="text-secondary">SKU will be auto-generated on save. Next SKU: <strong>{{ next_sku }}</strong></p>
{% endif %}
<form method="post" enctype="multipart/form-data" class="row g-3">
  {% csrf_token %}
  {{ form.as_p }}
  <div><button class="btn btn-primary" type="submit">{{ submit_label|default:"Create Product" }}</button></div>
</form>
{% endblock %}

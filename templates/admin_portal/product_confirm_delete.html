{% extends "admin_portal/base.html" %}
{% block content %}
<div class="page-head">
  <div>
    <h1>Delete Product</h1>
  </div>
</div>

<div style="max-width: 600px;">
  <div class="card">
    <div class="card-body">
      <div class="note red mb-3">
        <strong>Are you sure?</strong><br>
        This will permanently delete <strong>{{ product.name }}</strong> ({{ product.sku }}).
      </div>

      <form method="post" style="display: flex; gap: 10px; margin-top: 22px;">
        {% csrf_token %}
        <button type="submit" class="btn danger">Yes, Delete Product</button>
        <a href="{% url 'admin_portal:products' %}" class="btn ghost">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% extends "admin_portal/base.html" %}
{% block content %}
<h2 class="h4 mb-3">Fulfillment Queue</h2>
<div class="table-responsive">
<table class="table align-middle">
  <thead><tr><th>Order</th><th>Customer</th><th>Status</th><th></th></tr></thead>
  <tbody>
  {% for order in orders %}
    <tr>
      <td>#{{ order.id }}</td>
      <td>{{ order.customer.name }}</td>
      <td><span class="badge badge-soft status-{{ order.status }}">{{ order.status }}</span></td>
      <td><a href="{% url 'admin_portal:order_detail' order.id %}" class="btn btn-sm btn-outline-primary">Open</a></td>
    </tr>
  {% empty %}
    <tr><td colspan="4" class="text-secondary">No orders in queue.</td></tr>
  {% endfor %}
  </tbody>
</table>
</div>
{% endblock %}

{% extends "admin_portal/base.html" %}
{% block content %}
<div class="page-head">
  <div>
    <h1>Fulfillment Queue</h1>
    <div class="lede">Orders ready for picking and packing.</div>
  </div>
</div>

<div class="card flush">
  <div class="tbl-wrap">
    <table class="tbl">
      <thead><tr><th>Order</th><th>Customer</th><th>Status</th><th></th></tr></thead>
      <tbody>
        {% for order in orders %}
        <tr>
          <td class="strong">#{{ order.id }}</td>
          <td>{{ order.customer.name }}</td>
          <td><span class="pill status-{{ order.status }}">{{ order.status }}</span></td>
          <td><a href="{% url 'admin_portal:order_detail' order.id %}" class="btn sm">Open</a></td>
        </tr>
        {% empty %}
        <tr><td colspan="4" class="text-secondary">No orders in queue.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/portal.css' %}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark" style="background:#111827;">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2 me-3" href="{% url 'admin_portal:dashboard' %}">
        <img src="{% static 'PVL-LogoLockUp-4k_23aea92a-5a10-4e80-8421-66254bb1deb8.png' %}" alt="Provibe Life" class="brand-logo">
        <span class="d-none d-xl-inline">Admin Portal</span>
      </a>
      <div class="navbar-nav gap-1 small">
        <a class="nav-link" href="{% url 'admin_portal:dashboard' %}">Dashboard</a>
        <a class="nav-link" href="{% url 'admin_portal:customers' %}">Customers</a>
        <a class="nav-link" href="{% url 'admin_portal:products' %}">Products</a>
        <a class="nav-link" href="{% url 'admin_portal:pricing' %}">Pricing</a>
        <a class="nav-link" href="{% url 'admin_portal:orders' %}">Orders</a>
        <a class="nav-link" href="{% url 'admin_portal:fulfillment_queue' %}">Fulfillment</a>
        <a class="nav-link" href="{% url 'admin_portal:shipments' %}">Shipments</a>
        <a class="nav-link" href="{% url 'admin_portal:invoices' %}">Invoices</a>
        <a class="nav-link" href="{% url 'admin_portal:payments' %}">Payments</a>
        <a class="nav-link" href="{% url 'admin_portal:reports' %}">Reports</a>
      </div>
      <form action="{% url 'logout' %}" method="post" class="ms-auto">
        {% csrf_token %}
        <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
      </form>
    </div>
  </nav>

  <main class="container-fluid py-3">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-secondary py-2 mb-2">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <div class="card portal-card">
      <div class="card-body p-4">
        {% block content %}{% endblock %}
      </div>
    </div>
  </main>

  <script>
    document.querySelectorAll('input:not([type=checkbox]):not([type=radio]), select, textarea').forEach(el => {
      if (!el.classList.contains('form-control') && !el.classList.contains('form-select')) {
        if (el.tagName === 'SELECT') el.classList.add('form-select');
        else el.classList.add('form-control');
      }
    });
  </script>
</body>
</html>

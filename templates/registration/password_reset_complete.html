{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Reset Complete</title>
  <link href="{% static 'PVL/styles.css' %}" rel="stylesheet">
  <link href="{% static 'css/portal.css' %}" rel="stylesheet">
</head>
<body data-theme="light" data-density="comfortable">
  <div class="login-shell">
    <div class="login-art">
      <div class="brand-vertical"><img src="{% static 'PVL/assets/pvl-logo-full-vertical.png' %}" alt="Pro Vibe Life" style="height: 120px;"></div>
      <h2 style="color: white; font-size: 24px; margin-top: 40px;">Password Reset</h2>
      <p style="color: rgba(255,255,255,0.7);">Your password has been successfully reset.</p>
    </div>
    <div class="login-form">
      <h1>Password Reset Complete</h1>
      <div class="note green" style="margin-bottom: 20px;">
        <p>Your password has been successfully changed.</p>
      </div>
      <p style="text-align: center;">
        <a href="{% url 'login' %}" class="btn primary">Log In with New Password</a>
      </p>
    </div>
  </div>
</body>
</html>
